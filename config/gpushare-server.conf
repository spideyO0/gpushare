# gpushare server configuration

# GPU device index (nvidia-smi index)
device=0

# Port for CUDA RPC traffic
port=9847

# Maximum concurrent client connections
max_clients=16

# Logging level: error, info, debug
log_level=info

# Bind address — controls where traffic flows:
#   (empty)         = listen on ALL interfaces (LAN + internet)
#   192.168.x.x     = LAN only — traffic stays on local switch, never hits internet
#   0.0.0.0         = all IPv4 interfaces
#
# RECOMMENDED: Set this to your LAN IP to keep GPU traffic off the internet
# and use the full 1 Gbps switch bandwidth.
# Find your LAN IP with: ip -4 addr show | grep 'inet 192'
bind=
