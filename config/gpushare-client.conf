# gpushare client configuration
#
# Server address (hostname:port)
server=192.168.1.100:9847

# Local port for the client-side dashboard
dashboard_port=9849

# Automatically connect to server on library load
auto_connect=true

# Logging level: debug, info, warn, error
log_level=info

# Connection timeout in milliseconds
timeout_ms=5000

# Retry attempts on connection failure
retry_count=3

# Authentication token (must match server)
auth_token=
