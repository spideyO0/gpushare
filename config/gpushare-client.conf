# gpushare client configuration
#
# Server address (hostname:port)
server=192.168.1.100:9847

# Local port for the client-side dashboard
dashboard_port=9849

# Automatically connect to server on library load
auto_connect=true

# Logging level: debug, info, warn, error
log_level=info

# Connection timeout in milliseconds
timeout_ms=5000

# Retry attempts on connection failure
retry_count=3

# Authentication token (must match server)
auth_token=

# GPU mode: controls which GPUs are visible to applications
#   all    — show both local and remote GPUs (local first, remote after)
#   remote — only show remote GPU (default if no local GPU detected)
#   local  — only show local GPU (ignore remote server)
gpu_mode=all

# Path to backed-up real CUDA libraries (for local GPU passthrough)
# The install script automatically backs up real CUDA libs here.
# Only change this if you moved the backups elsewhere.
# real_cuda_path=/usr/local/lib/gpushare/real
